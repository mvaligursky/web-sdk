<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gracia PlayCanvas</title>
    <script type="importmap">
    { "imports": {
        "playcanvas": "https://cdn.jsdelivr.net/npm/playcanvas@2.17.0/build/playcanvas.mjs",
        "shadow-catcher": "https://cdn.jsdelivr.net/npm/playcanvas@2.17.0/scripts/esm/shadow-catcher.mjs",
        "@gracia/web-sdk": "./dist/GraciaAIO.js?v=__BUILD_HASH__",
        "@gracia/web-sdk/wasm": "./dist/GraciaWebCore.js?v=__BUILD_HASH__"
    } }
    </script>
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #000; color: #fff;
        --dim: rgba(255,255,255,.4); --mid: rgba(255,255,255,.65);
        --hi: #fff; --sh: 0 1px 3px rgba(0,0,0,.7);
        --glass: rgba(18,18,22,.72); --glass-border: rgba(255,255,255,.1);
        --hover: rgba(255,255,255,.08); --accent: rgba(120,160,255,.55);
        --panel-r: 10px;
    }
    canvas { display: block; }

    /* overlay layout */
    .ov { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 16px; }
    .ov > * { pointer-events: auto; }
    .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .bot { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .spacer { flex: 1; pointer-events: none; }

    /* glass panels */
    .panel {
        display: flex; align-items: center; gap: 6px; padding: 6px 10px;
        background: var(--glass); backdrop-filter: blur(18px) saturate(1.4);
        border: 1px solid var(--glass-border); border-radius: var(--panel-r);
        box-shadow: 0 4px 20px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
    }

    .lbl { font: 600 9px/1 inherit; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); text-shadow: var(--sh); }
    .divider { width: 1px; height: 18px; background: var(--glass-border); margin: 0 2px; flex-shrink: 0; }

    /* buttons */
    .btn {
        padding: 5px 11px; border: 0; border-radius: 6px;
        background: transparent; color: var(--dim); cursor: pointer;
        font: 600 11px/1.1 inherit; white-space: nowrap;
        text-shadow: var(--sh); transition: color .15s, background .15s;
    }
    .btn:hover:not(:disabled) { color: var(--hi); background: var(--hover); }
    .btn:disabled { opacity: .2; cursor: not-allowed; }
    .btn.on, .btn.active { color: var(--hi); background: rgba(255,255,255,.1); }

    /* dropdowns */
    .dropdown { position: relative; display: inline-block; }
    .dd-toggle {
        padding: 5px 24px 5px 10px; border: 1px solid var(--glass-border); border-radius: 6px;
        background: rgba(255,255,255,.05); color: var(--mid); cursor: pointer;
        font: 600 11px/1.1 inherit; white-space: nowrap; text-shadow: var(--sh);
        transition: border-color .15s, color .15s, background .15s; appearance: none;
    }
    .dd-toggle::after { content: ''; position: absolute; right: 9px; top: 50%; transform: translateY(-50%); border: 3.5px solid transparent; border-top: 3.5px solid var(--dim); transition: transform .15s; }
    .dd-toggle:hover { border-color: rgba(255,255,255,.25); color: var(--hi); background: rgba(255,255,255,.08); }
    .dropdown.open .dd-toggle { border-color: rgba(255,255,255,.25); }
    .dropdown.open .dd-toggle::after { transform: translateY(-50%) rotate(180deg); }
    .dd-menu {
        display: none; position: absolute; top: calc(100% + 6px); left: 0; z-index: 30; min-width: 100%;
        border: 1px solid rgba(255,255,255,.1); border-radius: 8px;
        background: rgba(16,16,20,.94); backdrop-filter: blur(20px) saturate(1.3);
        box-shadow: 0 10px 32px rgba(0,0,0,.55); padding: 4px;
    }
    .dropdown.open .dd-menu { display: block; }
    .dd-item {
        display: block; width: 100%; padding: 7px 12px; border: 0; border-radius: 5px;
        background: 0; color: var(--mid); cursor: pointer;
        font: 500 11px/1.3 inherit; text-align: left; white-space: nowrap;
        text-shadow: var(--sh); transition: background .1s, color .1s;
    }
    .dd-item:hover { background: var(--hover); color: var(--hi); }
    .dd-item.active { color: var(--hi); background: rgba(255,255,255,.06); }

    /* playback bar */
    .vb { display: flex; align-items: center; gap: 10px; padding: 2px 0; width: 100%; }
    .vb-btn { width: 30px; min-width: 30px; height: 30px; border: 0; border-radius: 50%; background: rgba(255,255,255,.12); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: background .15s; color: #fff; font-size: 14px; }
    .vb-btn:hover { background: rgba(255,255,255,.22); }
    .vb-track { flex: 1; height: 4px; background: rgba(255,255,255,.1); border-radius: 2px; position: relative; cursor: pointer; }
    .vb-fill { position: absolute; inset: 0 auto 0 0; border-radius: 2px; background: rgba(255,255,255,.45); width: 0; pointer-events: none; }
    .vb-thumb { position: absolute; top: 50%; width: 12px; height: 12px; background: #fff; border-radius: 50%; transform: translate(-50%,-50%); left: 0; box-shadow: 0 1px 6px #0008; }
    .vb-time { color: var(--dim); font: 500 11px/1 inherit; min-width: 70px; text-align: right; text-shadow: var(--sh); }
    .bar-panel { width: min(520px, calc(100% - 32px)); }

    /* bottom-right reset */
    .bot-right { position: fixed; bottom: 16px; right: 16px; z-index: 11; pointer-events: auto; }

    /* attribution */
    .ph-credit { position: fixed; bottom: 6px; left: 10px; z-index: 11; font: 400 9px/1 inherit; color: rgba(255,255,255,.2); text-decoration: none; pointer-events: auto; transition: color .15s; }
    .ph-credit:hover { color: rgba(255,255,255,.5); }

    @media (max-width: 720px) {
        .ov { padding: 10px; }
        .top { gap: 8px; flex-wrap: wrap; }
        .panel { padding: 5px 8px; gap: 4px; }
        .btn { padding: 4px 8px; font-size: 10px; }
        .dd-toggle { padding: 4px 20px 4px 8px; font-size: 10px; }
        .hide-sm { display: none; }
        .vb-time { font-size: 10px; min-width: 50px; }
        .bar-panel { width: calc(100% - 20px); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="ov">
        <div class="top">
            <div class="panel">
                <span class="lbl">Scene</span>
                <div class="divider"></div>
                <div class="dropdown" id="srcDD">
                    <button type="button" class="dd-toggle" id="srcToggle">Source&hellip;</button>
                    <div class="dd-menu" id="srcMenu"></div>
                </div>
            </div>
            <div class="panel">
                <span class="lbl">Environment</span>
                <div class="divider"></div>
                <div class="dropdown" id="skyDD">
                    <button type="button" class="dd-toggle" id="skyToggle">Sky&hellip;</button>
                    <div class="dd-menu" id="skyMenu"></div>
                </div>
            </div>
            <div class="spacer"></div>
        </div>
        <div class="bot">
            <div class="panel bar-panel" id="barWrap"></div>
        </div>
    </div>
    <div class="bot-right">
        <div class="panel"><button type="button" class="btn" id="resetCam">Reset</button></div>
    </div>
    <a class="ph-credit" href="https://polyhaven.com" target="_blank" rel="noopener">HDRI assets by Poly Haven</a>

    <script type="module">
    import * as pc from 'playcanvas';
    import { ShadowCatcher } from 'shadow-catcher';
    import { buildApiSources, EnvLighting, GraciaSplats } from '@gracia/web-sdk';
    import ModuleFactory from '@gracia/web-sdk/wasm';

    const $ = id => document.getElementById(id);
    const mk = (tag, cls, par) => { const e = document.createElement(tag); if (cls) e.className = cls; par?.appendChild(e); return e; };
    const clamp = (v, lo = 0, hi = 1) => Math.min(hi, Math.max(lo, v));
    const fmt = t => (!Number.isFinite(t) || t < 0) ? '0:00' : `${~~(t / 60)}:${String(~~t % 60).padStart(2, '0')}`;

    /* ── PlayCanvas app ──────────────────────────── */

    const canvas = document.createElement('canvas');
    document.body.prepend(canvas);

    const app = new pc.Application(canvas, {
        graphicsDeviceOptions: { alpha: true, antialias: true, preserveDrawingBuffer: false },
    });
    app.setCanvasFillMode(pc.FILLMODE_FILL_WINDOW);
    app.setCanvasResolution(pc.RESOLUTION_AUTO);
    app.graphicsDevice.maxPixelRatio = window.devicePixelRatio;
    app.scene.toneMapping = pc.TONEMAP_ACES;
    app.scene.gammaCorrection = pc.GAMMA_SRGB;
    app.scene.clusteredLightingEnabled = false;
    app.start();

    // Move Skybox before World so splats render correctly
    const layers = app.scene.layers;
    const skyboxLayer = layers.getLayerByName('Skybox');
    layers.remove(skyboxLayer);
    layers.insert(skyboxLayer, 0);

    window.addEventListener('resize', () => app.resizeCanvas());

    /* ── Camera + orbit controls ─────────────────── */

    const camera = new pc.Entity('camera');
    camera.addComponent('camera', {
        clearColor: new pc.Color(0.32, 0.30, 0.28),
        fov: 50,
        nearClip: 1,
        farClip: 500,
    });
    app.root.addChild(camera);

    const CAM_DEFAULTS = { azimuth: Math.PI * 0.8, elevation: 0.35, distance: 39, target: [0, 6, 0] };
    const SMOOTH = 12;
    let tAzimuth = CAM_DEFAULTS.azimuth,   azimuth = tAzimuth;
    let tElevation = CAM_DEFAULTS.elevation, elevation = tElevation;
    let tOrbitDist = CAM_DEFAULTS.distance,  orbitDist = tOrbitDist;
    const orbitTarget = new pc.Vec3(...CAM_DEFAULTS.target);
    let orbiting = false;

    function updateOrbitCamera() {
        const ce = Math.cos(azimuth), se = Math.sin(azimuth);
        const cEl = Math.cos(elevation), sEl = Math.sin(elevation);
        camera.setPosition(
            orbitTarget.x + orbitDist * cEl * se,
            orbitTarget.y + orbitDist * sEl,
            orbitTarget.z + orbitDist * cEl * ce,
        );
        camera.lookAt(orbitTarget);
    }
    updateOrbitCamera();

    function smoothCamera(dt) {
        const t = 1 - Math.exp(-SMOOTH * dt);
        azimuth   += (tAzimuth - azimuth) * t;
        elevation += (tElevation - elevation) * t;
        orbitDist += (tOrbitDist - orbitDist) * t;
        updateOrbitCamera();
    }

    canvas.addEventListener('pointerdown', e => {
        if (e.button === 0) { orbiting = true; canvas.setPointerCapture(e.pointerId); }
    });
    canvas.addEventListener('pointermove', e => {
        if (!orbiting) return;
        tAzimuth -= e.movementX * 0.005;
        tElevation = clamp(tElevation + e.movementY * 0.005, -Math.PI * 0.45, Math.PI * 0.45);
    });
    canvas.addEventListener('pointerup', () => { orbiting = false; });
    canvas.addEventListener('pointercancel', () => { orbiting = false; });
    canvas.addEventListener('wheel', e => {
        tOrbitDist = clamp(tOrbitDist + e.deltaY * 0.06, 10, 400);
    }, { passive: true });

    $('resetCam').onclick = () => {
        tAzimuth = CAM_DEFAULTS.azimuth;
        tElevation = CAM_DEFAULTS.elevation;
        tOrbitDist = CAM_DEFAULTS.distance;
        orbitTarget.set(...CAM_DEFAULTS.target);
    };

    /* ── Lights ── */

    const keyLight = new pc.Entity('keyLight');
    keyLight.addComponent('light', {
        type: 'directional',
        color: new pc.Color(1, 0.92, 0.78),
        intensity: 1,
        castShadows: true,
        shadowIntensity: 0.5,
        shadowResolution: 2048,
        shadowType: pc.SHADOW_PCF5_16F,
        shadowBias: 0.05,
        normalOffsetBias: 0.05,
        shadowDistance: 200,
    });
    const KEY_LIGHT_DEFAULT_ANGLES = [50, 35, 0];
    keyLight.setEulerAngles(...KEY_LIGHT_DEFAULT_ANGLES);
    app.root.addChild(keyLight);

    /* ── Materials helper ── */

    function mat(color, gloss, metalness) {
        const m = new pc.StandardMaterial();
        m.diffuse = new pc.Color(...color);
        m.gloss = gloss;
        m.metalness = metalness;
        m.useMetalness = true;
        m.update();
        return m;
    }

    function setupEntity(e, pos, scale, material, euler, shadows) {
        e.setLocalPosition(...pos);
        e.setLocalScale(...scale);
        if (euler) e.setLocalEulerAngles(...euler);
        e.render.meshInstances[0].material = material;
        app.root.addChild(e);
        return e;
    }

    function addObj(type, pos, scale, material, euler, shadows = true) {
        const e = new pc.Entity(type);
        e.addComponent('render', { type, castShadows: shadows, receiveShadows: true });
        return setupEntity(e, pos, scale, material, euler, shadows);
    }

    function addCylinder(pos, scale, material, euler, shadows = true) {
        const mesh = pc.createCylinder(app.graphicsDevice, { capSegments: 64 });
        const e = new pc.Entity('cylinder');
        e.addComponent('render', { type: 'asset', castShadows: shadows, receiveShadows: true });
        e.render.meshInstances = [new pc.MeshInstance(mesh, material)];
        return setupEntity(e, pos, scale, material, euler, shadows);
    }

    /* ── Pedestal (three-tier) ── */

    const pedestalMat = mat([0.75, 0.72, 0.68], 0.8, 0.2);
    const pedestal1 = addCylinder([0, -0.7, 0], [23.4, 0.6, 23.4], pedestalMat);
    const pedestal2 = addCylinder([0, -0.2, 0], [18.6, 0.4, 18.6], pedestalMat);
    const pedestal3 = addCylinder([0, -1.1, 0], [30.4, 0.2, 30.4], pedestalMat);
    pedestal1.enabled = false;
    pedestal2.enabled = false;
    pedestal3.enabled = false;

    /* ── Shadow catcher (used when projected skydomes are active) ── */

    const shadowCatcherEntity = new pc.Entity('ShadowCatcher');
    shadowCatcherEntity.addComponent('script').create(ShadowCatcher, {
        properties: {
            scale: new pc.Vec3(100, 100, 100)
        }
    });
    shadowCatcherEntity.setLocalPosition(0, 0, 0);
    shadowCatcherEntity.enabled = false;
    app.root.addChild(shadowCatcherEntity);

    /* ── Frame Update ── */

    app.on('update', dt => {
        smoothCamera(dt);
    });

    /* ── Sky presets ────────────────────────────────── */

    const SKY_PRESETS = {
        'None':         { url: null, sh: null, lightDir: null },
        'Street Dome': {
            url: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/wide_street_02_2k.hdr',
            type: pc.SKYTYPE_DOME,
            scale: [200, 200, 200],
            tripodY: 0.05,
            exposure: 0.7,
            rotation: 0,
            projected: true,
            keyLightAngles: [-50, 140, 0],
            sh: [1.87031,1.918464,2.000223,0.962367,1.050086,1.184771,1.543599,1.419717,1.262293,2.100156,1.935595,1.729669,1.584412,1.473231,1.336372,1.148921,1.068716,0.966966,-0.07552,-0.038685,-0.013138,2.609779,2.423938,2.198205,1.474358,1.355914,1.198138],
            lightDir: { x: 0.3, y: 1, z: 0.2 },
        },
        'Sunset': {
            url: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/industrial_sunset_puresky_2k.hdr',
            type: pc.SKYTYPE_INFINITE,
            scale: [200, 200, 200],
            tripodY: 0.05,
            exposure: 0.3,
            rotation: 90,
            sh: [2.198001,2.532174,3.182135,0.65039,0.790722,1.05029,0.5967,0.263902,-0.023595,0.780168,0.406654,0.068925,0.184931,0.112526,0.031816,0.153647,0.082786,0.016223,-0.012991,0.051354,0.091854,0.57614,0.450866,0.394832,0.667496,0.585546,0.532165],
            lightDir: { x: 1, y: 0.2, z: 0 },
        },
        'Rosendal Sunset': {
            url: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/rosendal_park_sunset_puresky_2k.hdr',
            type: pc.SKYTYPE_INFINITE,
            exposure: 0.3,
            rotation: 0,
            sh: [5.571507,4.571519,6.150409,0.383537,0.586309,1.092522,3.727947,2.327521,2.435435,5.006741,3.159468,3.324151,0.182788,0.23739,0.400604,0.158049,0.195062,0.321512,1.015175,0.722526,0.78891,4.37705,2.286575,1.999851,4.63148,2.827274,2.790029],
            lightDir: { x: 0.5, y: 0.3, z: 0 },
        },
        'Night': {
            url: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/solitude_night_2k.hdr',
            type: pc.SKYTYPE_DOME,
            scale: [200, 200, 200],
            tripodY: 0.05,
            exposure: 0.5,
            rotation: 0,
            projected: true,
            sh: [1.166094,0.622424,0.450999,0.352207,0.252218,0.308721,-0.058531,-0.046016,-0.127867,0.988865,0.407128,0.100454,0.281666,0.084706,-0.046188,-0.107987,-0.11409,-0.218669,0.110075,0.108467,0.133476,0.46739,0.387593,0.355134,0.922706,0.373184,0.100967],
            lightDir: { x: 0.2, y: 0.8, z: 0.1 },
        },
        'Sunrise': {
            url: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/stierberg_sunrise_2k.hdr',
            type: pc.SKYTYPE_DOME,
            scale: [200, 200, 200],
            tripodY: 0.05,
            exposure: 0.5,
            rotation: -80,
            projected: true,
            sh: [3.16565,3.163558,2.879746,-0.135058,0.047817,0.193577,1.849482,1.56818,0.683283,2.599934,2.261639,1.066521,0.32349,0.336824,0.240732,0.226919,0.219155,0.128605,0.115556,0.097011,0.054528,3.451919,3.049305,1.537143,2.690141,2.407626,1.361757],
            lightDir: { x: 0.2, y: 0.8, z: 0.1 },
        },
    };

    const hdriCache = new Map();

    function getOrGenerateHdri(url, texture) {
        if (hdriCache.has(url)) return hdriCache.get(url);
        const skybox = pc.EnvLighting.generateSkyboxCubemap(texture);
        const lighting = pc.EnvLighting.generateLightingSource(texture);
        const envAtlas = pc.EnvLighting.generateAtlas(lighting);
        lighting.destroy();
        const entry = { skybox, envAtlas };
        hdriCache.set(url, entry);
        return entry;
    }

    function applyHdri(url, texture) {
        const { skybox, envAtlas } = getOrGenerateHdri(url, texture);
        app.scene.skybox = skybox;
        app.scene.envAtlas = envAtlas;
    }

    let currentSH = null, currentLightDir = null;
    let relightScale = 1.0, relightAmbBoost = 1.0;

    function applyRelight(sh, lightDir) {
        currentSH = sh;
        currentLightDir = lightDir;
        if (!splats) return;
        if (!sh) { splats.player.clearEnvLighting(); return; }
        const env = new EnvLighting(sh).prepare(lightDir);
        if (relightAmbBoost > 0) {
            env.coefficients[0] += relightAmbBoost;
            env.coefficients[1] += relightAmbBoost;
            env.coefficients[2] += relightAmbBoost;
        }
        splats.player.setEnvLighting(env, relightScale);
    }

    function applySkySettings(preset) {
        const useProjected = !!preset.projected;
        pedestal1.enabled = !useProjected;
        pedestal2.enabled = !useProjected;
        pedestal3.enabled = !useProjected;
        shadowCatcherEntity.enabled = useProjected;

        keyLight.setEulerAngles(...(preset.keyLightAngles ?? KEY_LIGHT_DEFAULT_ANGLES));

        app.scene.skyboxRotation = new pc.Quat().setFromEulerAngles(0, preset.rotation ?? 0, 0);
        app.scene.exposure = preset.exposure ?? 1;
        app.scene.sky.center = new pc.Vec3(0, preset.tripodY ?? 0, 0);
        app.scene.sky.node.setLocalScale(new pc.Vec3(preset.scale ?? [1, 1, 1]));

        applyRelight(preset.sh, preset.lightDir);
    }

    function applySkyPreset(preset) {
        if (!preset.url) {
            pedestal1.enabled = true;
            pedestal2.enabled = true;
            pedestal3.enabled = true;
            shadowCatcherEntity.enabled = false;
            keyLight.setEulerAngles(...KEY_LIGHT_DEFAULT_ANGLES);
            app.scene.skybox = null;
            app.scene.envAtlas = null;
            app.scene.exposure = 0.65;
            applyRelight(null);
            return;
        }

        if (hdriCache.has(preset.url)) {
            applySkySettings(preset);
            app.scene.sky.type = preset.type ?? pc.SKYTYPE_INFINITE;
            applyHdri(preset.url, null);
            return;
        }

        const asset = new pc.Asset('hdri', 'texture', { url: preset.url }, { mipmaps: false });
        asset.on('load', () => {
            applySkySettings(preset);
            app.scene.sky.type = preset.type ?? pc.SKYTYPE_INFINITE;
            applyHdri(preset.url, asset.resource);
        });
        app.assets.add(asset);
        app.assets.load(asset);
    }

    function initSkyDropdown() {
        const dd = $('skyDD'), tog = $('skyToggle'), menu = $('skyMenu');
        for (const name of Object.keys(SKY_PRESETS)) {
            Object.assign(mk('button', 'dd-item', menu), { textContent: name }).dataset.sky = name;
        }
        tog.onclick = () => dd.classList.toggle('open');
        document.addEventListener('click', e => { if (!dd.contains(e.target)) dd.classList.remove('open'); });
        menu.onclick = e => {
            const item = e.target.closest('.dd-item'); if (!item) return;
            dd.classList.remove('open');
            const name = item.dataset.sky;
            tog.textContent = name;
            for (const i of menu.querySelectorAll('.dd-item')) i.classList.toggle('active', i.dataset.sky === name);
            applySkyPreset(SKY_PRESETS[name]);
        };
    }

    /* ── Gracia splats ─────────────────────────────── */

    const SPLAT_SCALE = 10;
    const SPLAT_POS = {
        'Fashion': [0, 12, 0],
        'Cycling': [0, 11.2, 0],
        'Doctor':  [0, 10.8, 0],
        'Singer':  [0, 11.9, 0],
        'Juggler': [0, 10.3, 0],
    };
    const SPLAT_POS_DEFAULT = [0, -14, 18];
    let splats = null;

    async function initGracia() {
        splats = await GraciaSplats.create(
            opts => ModuleFactory({ ...opts, print: console.log, printErr: console.error }),
            app,
            camera,
        );
        const splatEntity = new pc.Entity('splats');
        app.root.addChild(splatEntity);
        splats.entity = splatEntity;
        splats.enableMesh = true;

        const worldLayer = app.scene.layers.getLayerByName('World');
        app.scene.on('postrender:layer', (cam, layer, transparent) => {
            if (layer === worldLayer && transparent && splats) splats.renderFrame();
        });
    }

    /* ── Sources & dropdown ───────────────────────── */

    const MARKET = 'https://market.gracia.ai';
    const DEMO_URL = '/api/market/api/v1/demo';
    const STREAMING_BASE = `${MARKET}/api/v1/streaming/content`;
    const DEMO_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJpYXQiOjE3NzMyMjg4OTcsImV4cCI6MTg5NDM2MTY0MH0.U9kEeoph8JFV9zZ9ht7F7NAFpaLRIKRuMyFAYR9xqsw';

    const sources = [];

    async function loadSources() {
        const results = await Promise.allSettled([
            (async () => {
                const demos = await (await fetch(DEMO_URL)).json();
                return Promise.all(demos.map(async (d) => {
                    const res = await fetch(`${STREAMING_BASE}/${d.streamingId}`, {
                        headers: { 'X-VIEW-TOKEN': DEMO_TOKEN },
                    });
                    const { metadata, audioFileLink } = res.ok ? await res.json() : {};
                    return {
                        id: d.streamingId,
                        label: d.label ?? metadata?.name ?? d.streamingId,
                        url: `${STREAMING_BASE}/${d.streamingId}/`,
                        token: DEMO_TOKEN,
                        displayName: metadata?.name ?? undefined,
                        audio: (audioFileLink && metadata?.withAudio !== false) ? audioFileLink : undefined,
                        initialTransform: metadata?.initialSpawn ?? null,
                        locked: false,
                        resetPositionOnStart: true,
                        autoSwitchToNext: false,
                    };
                }));
            })(),
            (async () => {
                const raw = (await (await fetch('/api/sources')).json()).sources ?? [];
                const resolved = [];
                for (const src of raw)
                    if (src.items?.length) resolved.push(...await buildApiSources(src.items, src.baseUrl));
                    else resolved.push(src);
                return resolved;
            })(),
        ]);
        for (const r of results) if (r.status === 'fulfilled') sources.push(...r.value);
        for (const s of sources) Object.assign(mk('button', 'dd-item', $('srcMenu')), { textContent: s.label }).dataset.src = s.id;
    }

    function openSource(src, noAutoPlay = false) {
        if (!splats) return;
        const p = splats.player; p.close();
        const e = splats.entity;
        const pos = SPLAT_POS[src.label] ?? SPLAT_POS_DEFAULT;

        const tf = src.initialTransform;
        const yaw180 = new pc.Quat().setFromEulerAngles(0, 180, 0);
        if (tf) {
            const baseRot = tf.rotation
                ? new pc.Quat(tf.rotation.x, tf.rotation.y, tf.rotation.z, tf.rotation.w)
                : new pc.Quat(0, 0, 0, 1);
            e.setLocalRotation(new pc.Quat().copy(yaw180).mul(baseRot));
            if (tf.translation) e.setLocalPosition(
                tf.translation.x + pos[0],
                tf.translation.y + pos[1],
                tf.translation.z + pos[2],
            );
            else e.setLocalPosition(...pos);
            if (tf.scale) e.setLocalScale(
                tf.scale.x * SPLAT_SCALE,
                tf.scale.y * SPLAT_SCALE,
                tf.scale.z * SPLAT_SCALE,
            );
            else e.setLocalScale(SPLAT_SCALE, SPLAT_SCALE, SPLAT_SCALE);
        } else {
            e.setLocalPosition(0, 0, 0);
            e.setLocalRotation(yaw180);
            e.setLocalScale(1, 1, 1);
        }

        p.open(src);
        if (!noAutoPlay) {
            p.play();
            if (src.audio) splats.setAudio(src.audio);
        }
    }

    function initDropdown() {
        const dd = $('srcDD'), tog = $('srcToggle'), menu = $('srcMenu');
        tog.onclick = () => dd.classList.toggle('open');
        document.addEventListener('click', e => { if (!dd.contains(e.target)) dd.classList.remove('open'); });

        menu.onclick = e => {
            const item = e.target.closest('.dd-item'); if (!item) return;
            dd.classList.remove('open');
            const src = sources.find(s => s.id === item.dataset.src);
            if (src) { tog.textContent = src.label; for (const i of menu.querySelectorAll('.dd-item')) i.classList.toggle('active', i.dataset.src === src.id); openSource(src); }
        };
    }

    /* ── Player bar ──────────────────────────────── */

    function mountBar(container) {
        const bar = mk('div', 'vb', container), btn = mk('button', 'vb-btn', bar);
        const track = mk('div', 'vb-track', bar), fill = mk('div', 'vb-fill', track);
        const thumb = mk('div', 'vb-thumb', track), time = mk('span', 'vb-time', bar);
        const ICO = { play: '\u25B6', pause: '\u23F8', spin: '\u27F3' };
        let cur = '', drag = false;

        const pos = n => fill.style.width = thumb.style.left = `${n * 100}%`;
        const pct = e => clamp((e.clientX - track.getBoundingClientRect().left) / track.offsetWidth);
        const dur = () => splats?.player.duration ?? 0;

        function icon(s) {
            if (s === cur) return; cur = s;
            const sz = s === 'play' ? 14 : 12, ml = s === 'play' ? ';margin-left:2px' : '';
            const anim = s === 'spin' ? ';animation:spin .7s linear infinite;display:inline-block' : '';
            btn.innerHTML = `<span style="color:#fff;font-size:${sz}px${ml}${anim}">${ICO[s]}</span>`;
        }
        icon('play');
        btn.onclick = () => { if (!splats) return; const p = splats.player; p.isPlaying ? p.pause() : p.play(); };

        track.onpointerdown = e => { e.preventDefault(); drag = true; track.setPointerCapture(e.pointerId); pos(pct(e)); splats?.player.seek(pct(e) * dur()); };
        track.onpointermove = e => { if (!drag) return; pos(pct(e)); splats?.player.seek(pct(e) * dur()); };
        track.onpointerup = e => { drag = false; track.releasePointerCapture(e.pointerId); };
        track.onpointercancel = () => { drag = false; };

        return () => {
            if (!splats) return;
            const p = splats.player;
            icon(p.isBuffering || p.isSeeking ? 'spin' : p.isPlaying ? 'pause' : 'play');
            const c = p.currentTime, d = dur();
            if (!drag && d > 0) pos(clamp(c / d));
            time.textContent = `${fmt(c)} / ${fmt(d)}`;
        };
    }

    /* ── Render-loop tick for playback bar ────────── */

    let tickBar;
    app.on('update', () => { tickBar?.(); });

    /* ── Bootstrap ───────────────────────────────── */

    (async () => {
        try {
            await loadSources(); initDropdown();
            initSkyDropdown();
            tickBar = mountBar($('barWrap'));
            await initGracia();

            const defaultSky = 'Street Dome';
            $('skyToggle').textContent = defaultSky;
            for (const i of $('skyMenu').querySelectorAll('.dd-item')) i.classList.toggle('active', i.dataset.sky === defaultSky);
            applySkyPreset(SKY_PRESETS[defaultSky]);

            const defaultSrc = sources.find(s => s.label === 'Fashion');
            if (defaultSrc) {
                $('srcToggle').textContent = defaultSrc.label;
                for (const i of $('srcMenu').querySelectorAll('.dd-item')) i.classList.toggle('active', i.dataset.src === defaultSrc.id);
                openSource(defaultSrc, true);

                // Browser requires a user gesture before audio/video can play.
                // Start playback and attach audio on the first interaction.
                document.addEventListener('pointerdown', () => {
                    const p = splats.player;
                    if (!p.isPlaying) p.play();
                    if (defaultSrc.audio) splats.setAudio(defaultSrc.audio);
                }, { once: true });
            }
        } catch (e) { console.error(e); }
    })();
    </script>
</body>
</html>
